<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; color: #fff; overflow-x: hidden; }
  #root { min-height: 100vh; }
  #particles-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.35;
}

#cursor-glow{
  position:fixed;
  pointer-events:none;
  z-index:9998;
  width:320px;
  height:320px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,.07) 0%,rgba(244,114,182,.03) 45%,transparent 70%);
  transform:translate(-50%,-50%);
  transition: opacity .3s ease;
}

#scroll-bar{
  position:fixed;
  top:0;
  left:0;
  height:2px;
  z-index:9999;
  width:0%;
  background:linear-gradient(to right,
  rgba(255,255,255,.2),
  rgba(255,255,255,.8));
}

#page-veil{
  position:fixed;
  inset:0;
  background:#000;
  z-index:99999;
  animation:veilOut 1s ease forwards;
}

@keyframes veilOut{
  from{opacity:1}
  to{opacity:0;visibility:hidden}
}

.shimmer-text{
  background:linear-gradient(
  90deg,
  rgba(255,255,255,.6),
  white,
  rgba(255,255,255,.6));
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 4s linear infinite;
}

@keyframes shimmer{
  from{background-position:-200%}
  to{background-position:200%}
}

  /* ── Video background ── */
  #bg-video-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  #bg-video-wrap video {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.38;
  }
  #bg-video-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.55) 0%,
      rgba(0,0,0,0.30) 40%,
      rgba(0,0,0,0.55) 100%);
  }

  /* Make all sections transparent so the video shows through */
  section, footer { background: transparent !important; }

  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border: none;
    box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%,
      rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  @keyframes driftA { 0%,100%{transform:translate(0,0)} 40%{transform:translate(22px,-28px)} 70%{transform:translate(-18px,18px)} }
  .orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(90px); animation:driftA 15s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* ══════════ GLOBAL 3D / GLOW / TRANSITION LAYER ══════════ */

  :root{
    --violet: 167,139,250;
    --pink: 244,114,182;
    --cyan: 103,232,249;
    --glow-soft: 0 0 18px rgba(167,139,250,.25), 0 0 38px rgba(244,114,182,.12);
  }

  body{ perspective: 1800px; }

  /* smooth global transitions on color/shadow/transform-affecting props */
  a, button, .liquid-glass, .liquid-glass-strong, h1, h2, h3, p, span, img, svg, .tilt-card {
    transition: transform .55s cubic-bezier(.16,1,.3,1),
                box-shadow .55s cubic-bezier(.16,1,.3,1),
                filter .55s cubic-bezier(.16,1,.3,1),
                background-color .4s ease,
                border-color .4s ease,
                opacity .5s ease;
  }

  /* ---------- glow halo applied to glass surfaces ---------- */
  .liquid-glass, .liquid-glass-strong{
    will-change: transform, box-shadow;
  }
  .liquid-glass:hover, .liquid-glass-strong:hover{
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 8px 30px -8px rgba(0,0,0,.6),
      0 0 24px -2px rgba(var(--violet),.35),
      0 0 46px -4px rgba(var(--pink),.22),
      inset 0 1px 1px rgba(255,255,255,.15);
    transform: translateY(-4px) scale(1.015);
  }

  /* ---------- 3D tilt wrapper (JS sets --rx/--ry/--tz) ---------- */
  .tilt-card{
    --rx: 0deg; --ry: 0deg; --tz: 0px;
    transform-style: preserve-3d;
    transform: perspective(900px) rotateX(var(--rx)) rotateY(var(--ry)) translateZ(var(--tz));
  }

  /* ---------- glow pulse for accent glyphs / icons ---------- */
  .glow-pulse{
    animation: glowPulse 3.2s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%,100%{ filter: drop-shadow(0 0 4px rgba(var(--violet),.5)) drop-shadow(0 0 10px rgba(var(--pink),.25)); opacity:.7; }
    50%{ filter: drop-shadow(0 0 12px rgba(var(--cyan),.85)) drop-shadow(0 0 26px rgba(var(--violet),.5)); opacity:1; }
  }

  /* ---------- text glow on headings ---------- */
  .text-glow{
    text-shadow:
      0 0 14px rgba(var(--violet),.35),
      0 0 30px rgba(var(--pink),.18);
  }

  /* ---------- magnetic hover-rotate for buttons/badges ---------- */
  .hover-rotate{
    transition: transform .5s cubic-bezier(.34,1.56,.64,1), box-shadow .5s ease;
  }
  .hover-rotate:hover{
    transform: rotate(-3deg) scale(1.07);
  }

  /* ---------- spin-slow for glyph dividers / orbiting accents ---------- */
  .spin-slow{ animation: spinSlow 18s linear infinite; display:inline-block; }
  @keyframes spinSlow{ to{ transform: rotate(360deg); } }

  /* ---------- fade-rise scroll reveal (driven by IntersectionObserver) ---------- */
  .reveal{
    opacity: 0;
    transform: translateY(36px) scale(.97);
    filter: blur(6px);
    transition: opacity 1s cubic-bezier(.16,1,.3,1),
                transform 1s cubic-bezier(.16,1,.3,1),
                filter 1s cubic-bezier(.16,1,.3,1);
  }
  .reveal.is-visible{
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }

  /* ---------- glow ring sweep for primary CTA ---------- */
  .glow-ring{ position: relative; }
  .glow-ring::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius: inherit;
    background: conic-gradient(from 0deg,
      rgba(var(--violet),0), rgba(var(--violet),.9),
      rgba(var(--pink),.9), rgba(var(--cyan),.9),
      rgba(var(--violet),0));
    opacity: 0;
    z-index: -1;
    filter: blur(10px);
    transition: opacity .5s ease;
    animation: ringSpin 6s linear infinite;
  }
  .glow-ring:hover::after{ opacity: .85; }
  @keyframes ringSpin{ to{ transform: rotate(360deg); } }

  /* ---------- shimmer sweep across glass cards on hover ---------- */
  .sheen{ position: relative; overflow: hidden; }
  .sheen::before{
    content:"";
    position:absolute;
    top:0; left:-150%;
    width:60%; height:100%;
    background: linear-gradient(115deg, transparent, rgba(255,255,255,.16), transparent);
    transform: skewX(-15deg);
    transition: left 1.1s cubic-bezier(.16,1,.3,1);
    pointer-events:none;
  }
  .sheen:hover::before{ left:150%; }

  /* ---------- floating idle motion ---------- */
  .float-y{ animation: floatY 5s ease-in-out infinite; }
  @keyframes floatY{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }

  /* ---------- number pop on countdown tick ---------- */
  @keyframes numPop{ 0%{ transform: scale(1); filter: drop-shadow(0 0 0 rgba(var(--cyan),0)); } 35%{ transform: scale(1.18); filter: drop-shadow(0 0 10px rgba(var(--cyan),.8)); } 100%{ transform: scale(1); filter: drop-shadow(0 0 0 rgba(var(--cyan),0)); } }
  .num-pop{ animation: numPop .5s ease-out; display:inline-block; }

  /* ---------- confetti / surprise glow burst ---------- */
  @keyframes burstGlow{
    0%{ box-shadow: 0 0 0 0 rgba(var(--violet),.6), 0 0 0 0 rgba(var(--pink),.4); }
    60%{ box-shadow: 0 0 40px 14px rgba(var(--violet),.25), 0 0 80px 30px rgba(var(--pink),.12); }
    100%{ box-shadow: 0 0 0 0 rgba(var(--violet),0), 0 0 0 0 rgba(var(--pink),0); }
  }
  .burst-glow{ animation: burstGlow 1.4s ease-out; }

  /* ---------- scrollbar styling for that polished feel ---------- */
  ::-webkit-scrollbar{ width: 8px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: linear-gradient(rgba(var(--violet),.4), rgba(var(--pink),.4)); border-radius: 9999px; }

  /* ---------- selection color matches palette ---------- */
  ::selection{ background: rgba(var(--violet),.35); color:#fff; }

  /* ---------- divider glyph glow ---------- */
  .glyph-glow{
    filter: drop-shadow(0 0 6px rgba(var(--violet),.6));
  }
</style>

<script type="text/babel">
const { motion, useInView } = window.Motion;

window.BlurText = function BlurText({ text, className, as: Tag = 'p' }) {
  const ref = React.useRef(null);
  const isInView = useInView(ref, { threshold: 0.1, once: true });
  const words = text.split(' ');

  return (
    <Tag
      ref={ref}
      style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
      className={className}
    >
      {words.map((word, i) => (
        <motion.span
          key={i}
          initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
          animate={isInView ? {
            filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
            opacity: [0, 0.5, 1],
            y: [50, -5, 0],
          } : {}}
          transition={{
            duration: 0.7,
            delay: (i * 100) / 1000,
            ease: 'easeOut',
            times: [0, 0.5, 1],
          }}
          style={{ display: 'inline-block', marginRight: '0.28em' }}
        >
          {word}
        </motion.span>
      ))}
    </Tag>
  );
};
</script>

<script type="text/babel">
window.MusicButton = function MusicButton() {
  const [playing, setPlaying] = React.useState(true);
  const toggle = () => {
    const audio = document.getElementById('bgAudio');
    if (audio.paused) { audio.play().catch(()=>{}); setPlaying(true); }
    else { audio.pause(); setPlaying(false); }
  };
  return (
    <button
      onClick={toggle}
      className="liquid-glass-strong glow-ring hover-rotate fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full flex items-center justify-center hover:bg-white/5 transition-colors"
      aria-label="Toggle background music"

        {[0,1,2,3].map(i => (
          <span
            key={i}
            className="block w-[3px] rounded-full bg-white"
            style={{
              height: playing ? undefined : 4,
              animation: playing ? `eq ${0.8 + i*0.13}s ease-in-out ${-i*0.2}s infinite` : 'none',
            }}
          />

};
</script>

<!-- Countdown -->
<script type="text/babel">
const { motion: mcd, useInView: uivcd } = window.Motion;
const C = 276.5;

window.CountdownSection = function CountdownSection() {
  const ref = React.useRef(null);
  const inView = uivcd(ref, { threshold: 0.1, once: true });
  const [vals, setVals] = React.useState({ d: '--', h: '--', m: '--', s: '--' });
  const [offsets, setOffsets] = React.useState({ d: C, h: C, m: C, s: C });
  const [celebrate, setCelebrate] = React.useState(false);
  const [dobDay, setDobDay] = React.useState('');

  React.useEffect(() => {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    setDobDay(days[new Date(2007,5,19).getDay()]);

    function nextBd() {
      const n = new Date(), y = n.getFullYear();
      let bd = new Date(y,5,19);
      if (bd <= n) bd = new Date(y+1,5,19);
      return bd;
    }
    function p2(n) { return String(n).padStart(2,'0'); }
    function tick() {
      const now = new Date(), bd = nextBd(), diff = bd - now;
      if (diff <= 0) {
        setVals({ d:'00', h:'00', m:'00', s:'00' });
        setCelebrate(true);
        return;
      }
      const d = Math.floor(diff/864e5);
      const h = Math.floor((diff%864e5)/36e5);
      const m = Math.floor((diff%36e5)/6e4);
      const s = Math.floor((diff%6e4)/1e3);
      setVals({ d:p2(d), h:p2(h), m:p2(m), s:p2(s) });
      setOffsets({
        d: C - (d/365)*C,
        h: C - (h/24)*C,
        m: C - (m/60)*C,
        s: C - (s/60)*C,
      });
    }
    tick();
    const iv = setInterval(tick, 1000);
    return () => clearInterval(iv);
  }, []);

  const units = [
    { key:'d', label:'Days' },
    { key:'h', label:'Hours' },
    { key:'m', label:'Minutes' },
    { key:'s', label:'Seconds' },
  ];

  function handleTilt(e) {
    const el = e.currentTarget;
    const r = el.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    el.style.setProperty('--ry', (px * 16) + 'deg');
    el.style.setProperty('--rx', (-py * 16) + 'deg');
    el.style.setProperty('--tz', '14px');

<script type="text/babel">
const { motion: ms } = window.Motion;

function launchConfetti(canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ps = Array.from({ length: 180 }, () => ({
    x: Math.random()*canvas.width, y: canvas.height*(0.2+Math.random()*0.3),
    vx: (Math.random()-0.5)*5, vy: -(Math.random()*6+3),
    w: Math.random()*9+4, h: Math.random()*5+2,
    rot: Math.random()*360, rv: (Math.random()-0.5)*10,
    col: ['#ffffff','#cfcfcf','#9e9e9e','#e8e8e8','#bdbdbd'][Math.floor(Math.random()*5)],
    alpha: 1,
  }));
  let fr = 0;
  (function f() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rv;
      if (fr > 120) p.alpha = Math.max(0, p.alpha - 0.008);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha = p.alpha; ctx.fillStyle = p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    fr++;
    if (fr < 260) requestAnimationFrame(f);
    else canvas.style.display = 'none';
  })();
}

window.SurpriseSection = function SurpriseSection() {
  const [revealed, setRevealed] = React.useState(false);

  return (
    <section className="px-6 py-28 md:py-36 text-center relative">
      <canvas ref={canvasRef} style={{ position:'fixed', inset:0, zIndex:8000, pointerEvents:'none', display:'none' }} />

        {!revealed && (
          <button

            className="liquid-glass-strong glow-ring sheen rounded-full px-8 py-4 inline-flex items-center gap-3 text-white font-heading italic text-lg hover:bg-white/5 transition-colors float-y"
          >

        <ms.div
          initial={{ opacity: 0, y: 16, scale: 0.94, filter: 'blur(8px)' }}
          animate={revealed ? { opacity: 1, y: 0, scale: 1, filter: 'blur(0px)' } : {}}
          transition={{ duration: 1.1, ease: 'easeOut' }}

        >
          {revealed && (

              <div className="font-heading italic text-white text-4xl md:text-5xl leading-tight mb-4 text-glow">Happy Birthday,<br/>Rumana.</div>

<script>
// cursor glow
const glow=document.getElementById("cursor-glow");

document.addEventListener("mousemove",(e)=>{
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";
});

// scroll progress
const bar=document.getElementById("scroll-bar");

window.addEventListener("scroll",()=>{
  const p=(window.scrollY/
  (document.body.scrollHeight-window.innerHeight))*100;

  bar.style.width=p+"%";
});

// particles — interactive glowing constellation
(()=>{
 const canvas=document.getElementById("particles-canvas");
 const ctx=canvas.getContext("2d");
 const mouse = { x: -9999, y: -9999 };

 function resize(){
   canvas.width=innerWidth;
   canvas.height=innerHeight;
 }
 resize();
 addEventListener("resize",resize);
 addEventListener("mousemove", (e)=>{ mouse.x = e.clientX; mouse.y = e.clientY; });
 addEventListener("mouseleave", ()=>{ mouse.x = -9999; mouse.y = -9999; });

 const PALETTE = ['167,139,250','244,114,182','103,232,249','255,255,255'];

 const dots=Array.from({length:70},()=>({
   x:Math.random()*innerWidth,
   y:Math.random()*innerHeight,
   vx:(Math.random()-0.5)*0.25,
   vy:(Math.random()-0.5)*0.25,
   r:Math.random()*1.6+0.6,
   col: PALETTE[Math.floor(Math.random()*PALETTE.length)],
 }));

 function draw(){
   ctx.clearRect(0,0,canvas.width,canvas.height);

   // connecting constellation lines
   for (let i=0;i<dots.length;i++){
     for (let j=i+1;j<dots.length;j++){
       const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
       const dist=Math.sqrt(dx*dx+dy*dy);
       if (dist<120){
         ctx.beginPath();
         ctx.moveTo(dots[i].x,dots[i].y);
         ctx.lineTo(dots[j].x,dots[j].y);
         ctx.strokeStyle=`rgba(167,139,250,${0.12*(1-dist/120)})`;
         ctx.lineWidth=0.6;
         ctx.stroke();
       }
     }
     // line to cursor for nearby dots — constellation reacts to user
     const mdx=dots[i].x-mouse.x, mdy=dots[i].y-mouse.y;
     const mdist=Math.sqrt(mdx*mdx+mdy*mdy);
     if (mdist<150){
       ctx.beginPath();
       ctx.moveTo(dots[i].x,dots[i].y);
       ctx.lineTo(mouse.x,mouse.y);
       ctx.strokeStyle=`rgba(244,114,182,${0.25*(1-mdist/150)})`;
       ctx.lineWidth=0.8;
       ctx.stroke();
     }
   }

   dots.forEach(d=>{
     d.x+=d.vx; d.y+=d.vy;
     if (d.x<0) d.x=innerWidth; if (d.x>innerWidth) d.x=0;
     if (d.y<0) d.y=innerHeight; if (d.y>innerHeight) d.y=0;

     ctx.beginPath();
     ctx.arc(d.x,d.y,d.r*2.6,0,Math.PI*2);
     ctx.fillStyle=`rgba(${d.col},.08)`;
     ctx.fill();

     ctx.beginPath();
     ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
     ctx.fillStyle=`rgba(${d.col},.65)`;
     ctx.fill();
   });

   requestAnimationFrame(draw);
 }

 draw();
})();

// scroll-reveal: fade/rise/blur-in for sections & cards as they enter viewport
(()=>{
  function applyReveal(){
    const targets = document.querySelectorAll('section, .liquid-glass, .liquid-glass-strong');
    targets.forEach(el=>{
      if (!el.classList.contains('reveal') && !el.dataset.revealSkip){
        el.classList.add('reveal');
      }
    });
  }
  // Run repeatedly for first few seconds since React renders async
  let tries = 0;
  const iv = setInterval(()=>{
    applyReveal();
    tries++;
    if (tries > 40) clearInterval(iv);
  }, 150);

  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if (entry.isIntersecting){
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

  const observeIv = setInterval(()=>{
    document.querySelectorAll('.reveal:not(.is-visible)').forEach(el=>observer.observe(el));
  }, 200);
  setTimeout(()=>clearInterval(observeIv), 8000);
})();

// global 3D tilt for any liquid-glass surface not already wired with a custom handler
(()=>{
  function wire(){
    document.querySelectorAll('.liquid-glass, .liquid-glass-strong').forEach(el=>{
      if (el.dataset.tiltWired) return;
      el.dataset.tiltWired = '1';
      el.classList.add('tilt-card');
      el.addEventListener('mousemove', (e)=>{
        const r = el.getBoundingClientRect();
        const px = (e.clientX - r.left)/r.width - 0.5;
        const py = (e.clientY - r.top)/r.height - 0.5;
        el.style.setProperty('--ry', (px*6)+'deg');
        el.style.setProperty('--rx', (-py*6)+'deg');
        el.style.setProperty('--tz', '4px');
      });
      el.addEventListener('mouseleave', ()=>{
        el.style.setProperty('--ry','0deg');
        el.style.setProperty('--rx','0deg');
        el.style.setProperty('--tz','0px');
      });
    });
  }
  let tries = 0;
  const iv = setInterval(()=>{ wire(); tries++; if (tries>40) clearInterval(iv); }, 150);
})();
</script>
